# =============================================================================
# Training configuration for EDM Policy with Hard Move n=6 (teacher for Consistency)
# =============================================================================

_target_: workspaces.train_bfn_workspace.TrainBFNWorkspace

name: train_edm_hard_move_n6
task_name: hard_move_n6
exp_name: edm_n6

shape_meta:
  obs:
    state:
      shape: [4]
      type: low_dim
  action:
    shape: [65]

horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: 2
past_action_visible: false
obs_as_global_cond: true

policy:
  _target_: policies.edm_lowdim_policy.EDMLowdimPolicy
  obs_dim: 4
  action_dim: 65
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}

  sigma_min: 0.002
  sigma_max: 80.0
  rho: 7.0
  num_inference_steps: 40
  solver: heun
  P_mean: -1.2
  P_std: 1.2

  delta: -1.0

  obs_encoder_dims: [256, 256]
  diffusion_step_embed_dim: 128
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

task:
  dataset:
    _target_: dataset.hard_move_dataset.HardMoveContinuousDataset
    zarr_path: data/hard_move_n6/replay_filtered.zarr
    num_discrete: 64
    horizon: ${horizon}
    pad_before: 1
    pad_after: 7
    seed: 42
    val_ratio: 0.02

  env_runner: null

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: cuda:0
  seed: 42
  debug: false
  resume: true
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 200
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 50
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

dataloader:
  batch_size: 128
  num_workers: 4
  shuffle: true
  pin_memory: true
  persistent_workers: false

val_dataloader:
  batch_size: 128
  num_workers: 4
  shuffle: false
  pin_memory: true
  persistent_workers: false

checkpoint:
  topk:
    monitor_key: train_loss
    mode: min
    k: 3
    format_str: epoch={epoch:04d}-train_loss={train_loss:.4f}.ckpt
  save_last_ckpt: true
  save_last_snapshot: false

logging:
  project: edm_hard_move
  resume: true
  mode: offline
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags:
    - ${name}
    - ${task_name}
    - ${exp_name}
    - edm
    - hard_move
    - n6
  id: null
  group: null

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
