# =============================================================================
# Training configuration for DDPM Policy with Hard Move n=4
# Task: Hard Move - 16 discrete actions (one-hot) + 1D continuous
# Action dim = 16 (one-hot) + 1 (continuous) = 17
# =============================================================================

_target_: workspaces.train_bfn_workspace.TrainBFNWorkspace

name: train_ddpm_hard_move_n4
task_name: hard_move_n4
exp_name: ddpm_n4

shape_meta:
  obs:
    state:
      shape: [4]
      type: low_dim
  action:
    shape: [17]  # 16 one-hot + 1 continuous

horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: 2
past_action_visible: false
obs_as_global_cond: true

policy:
  _target_: policies.diffusion_lowdim_policy.DiffusionLowdimPolicy
  obs_dim: 4
  action_dim: 17
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}

  scheduler_type: ddpm
  num_train_timesteps: 100
  num_inference_steps: 100

  obs_encoder_dims: [256, 256]
  diffusion_step_embed_dim: 128
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

task:
  dataset:
    _target_: dataset.hard_move_dataset.HardMoveContinuousDataset
    zarr_path: data/hard_move_n4/replay_filtered.zarr
    num_discrete: 16
    horizon: ${horizon}
    pad_before: 1
    pad_after: 7
    seed: 42
    val_ratio: 0.02

  env_runner: null

ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

training:
  device: cuda:0
  seed: 42
  debug: false
  resume: true
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 200
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 50
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

dataloader:
  batch_size: 128
  num_workers: 4
  shuffle: true
  pin_memory: true
  persistent_workers: false

val_dataloader:
  batch_size: 128
  num_workers: 4
  shuffle: false
  pin_memory: true
  persistent_workers: false

checkpoint:
  topk:
    monitor_key: train_loss
    mode: min
    k: 3
    format_str: epoch={epoch:04d}-train_loss={train_loss:.4f}.ckpt
  save_last_ckpt: true
  save_last_snapshot: false

logging:
  project: ddpm_hard_move
  resume: true
  mode: offline
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags:
    - ${name}
    - ${task_name}
    - ${exp_name}
    - ddpm
    - hard_move
    - n4
  id: null
  group: null

multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

hydra:
  job:
    override_dirname: ${name}
  run:
    dir: outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
