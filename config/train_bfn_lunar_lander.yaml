# =============================================================================
# Training configuration for BFN Policy with HYBRID action space
# Task: Lunar Lander - 4 discrete actions + 2D continuous parameters
#
# This config uses BFN's native discrete action handling via Dirichlet-Categorical
# conjugacy for the 4 discrete actions (COAST, MAIN_ENGINE, LEFT_BOOST, RIGHT_BOOST)
# and Gaussian-Gaussian conjugacy for the 2D continuous parameters.
# =============================================================================

# Workspace target
_target_: workspaces.train_bfn_workspace.TrainBFNWorkspace

# Experiment info
name: train_bfn_hybrid_lunar_lander
task_name: lunar_lander
exp_name: bfn_hybrid

# Shape meta
shape_meta:
  obs:
    state:
      shape: [8]
      type: low_dim
  action:
    shape: [3]  # 1 discrete class + 2 continuous params

# ================== Horizons ==================
horizon: 16
n_obs_steps: 2
n_action_steps: 8
n_latency_steps: 0
dataset_obs_steps: 2
past_action_visible: false
obs_as_global_cond: true

# ================== Policy ==================
policy:
  _target_: policies.bfn_hybrid_lowdim_policy.BFNHybridLowdimPolicy
  obs_dim: 8
  horizon: ${horizon}
  n_obs_steps: ${n_obs_steps}
  n_action_steps: ${n_action_steps}

  # Lunar Lander action space
  num_discrete_actions: 4  # COAST, MAIN_ENGINE, LEFT_BOOST, RIGHT_BOOST
  continuous_param_dim: 2  # intensity, duration_frac

  # BFN-specific config
  sigma_1: 0.001      # Continuous noise schedule
  beta_1: 0.2         # Discrete accuracy schedule
  n_timesteps: 20     # Fast sampling (vs 100 for diffusion)

  # Network config
  obs_encoder_dims: [256, 256]
  diffusion_step_embed_dim: 128
  down_dims: [256, 512, 1024]
  kernel_size: 5
  n_groups: 8
  cond_predict_scale: true

# ================== Task (Dataset) ==================
task:
  dataset:
    _target_: dataset.lunar_lander_dataset.LunarLanderHybridDataset
    zarr_path: data/lunar_lander/replay_buffer.zarr
    horizon: ${horizon}
    pad_before: 1
    pad_after: 7
    seed: 42
    val_ratio: 0.02

  env_runner:
    _target_: env_runners.lunar_lander_runner.LunarLanderEnvRunner
    n_episodes: 10
    max_episode_steps: 500
    use_image_obs: false
    record_video: true
    video_every: 5

# ================== EMA ==================
ema:
  _target_: diffusion_policy.model.diffusion.ema_model.EMAModel
  update_after_step: 0
  inv_gamma: 1.0
  power: 0.75
  min_value: 0.0
  max_value: 0.9999

# ================== Optimizer ==================
optimizer:
  _target_: torch.optim.AdamW
  lr: 1.0e-4
  betas: [0.95, 0.999]
  eps: 1.0e-8
  weight_decay: 1.0e-6

# ================== Training ==================
training:
  device: cuda:0
  seed: 42
  debug: false
  resume: true
  lr_scheduler: cosine
  lr_warmup_steps: 500
  num_epochs: 200  # Smaller dataset, faster convergence
  gradient_accumulate_every: 1
  use_ema: true
  rollout_every: 50
  checkpoint_every: 50
  val_every: 1
  sample_every: 5
  max_train_steps: null
  max_val_steps: null
  tqdm_interval_sec: 1.0

# ================== Dataloader ==================
dataloader:
  batch_size: 128
  num_workers: 4
  shuffle: true
  pin_memory: true
  persistent_workers: false

val_dataloader:
  batch_size: 128
  num_workers: 4
  shuffle: false
  pin_memory: true
  persistent_workers: false

# ================== Checkpoint ==================
checkpoint:
  topk:
    monitor_key: train_loss
    mode: min
    k: 3
    format_str: epoch={epoch:04d}-train_loss={train_loss:.4f}.ckpt
  save_last_ckpt: true
  save_last_snapshot: false

# ================== Logging ==================
logging:
  project: bfn_lunar_lander
  resume: true
  mode: offline
  name: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}
  tags:
    - ${name}
    - ${task_name}
    - ${exp_name}
    - bfn
    - hybrid
    - discrete
  id: null
  group: null

# ================== Multi-run ==================
multi_run:
  run_dir: data/outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  wandb_name_base: ${now:%Y.%m.%d-%H.%M.%S}_${name}_${task_name}

# ================== Hydra ==================
hydra:
  job:
    override_dirname: ${name}
  run:
    dir: outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
  sweep:
    dir: outputs/${now:%Y.%m.%d}/${now:%H.%M.%S}_${name}_${task_name}
    subdir: ${hydra.job.num}
